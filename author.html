<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autor — Moja Biblioteka</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
    header{background:#fff;border-bottom:1px solid #e5e5e5;padding:1rem 2rem;display:flex;align-items:center;gap:.75rem}
    header h1{font-size:1.25rem;font-weight:600}
    nav{margin-left:auto;display:flex;gap:1rem}
    nav a{font-size:.85rem;color:#6366f1;text-decoration:none;font-weight:500}
    nav a:hover{text-decoration:underline}
    .container{max-width:900px;margin:0 auto;padding:2rem 1rem}
    .author-header{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem}
    .author-avatar{width:72px;height:72px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:600;color:#6366f1;flex-shrink:0}
    .author-info h2{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
    .author-info p{font-size:.9rem;color:#555;line-height:1.6}
    .card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.5rem}
    .card h2{font-size:1rem;font-weight:600;margin-bottom:1rem;color:#333}
    .books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
    .book-card{background:#fafafa;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden}
    .book-cover{width:100%;height:140px;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden}
    .book-cover img{width:100%;height:100%;object-fit:cover}
    .book-body{padding:.65rem}
    .book-body h3{font-size:.85rem;font-weight:600;line-height:1.3;margin-bottom:.2rem}
    .genre-badge{display:inline-block;background:#f0fdf4;color:#16a34a;font-size:.68rem;font-weight:600;border-radius:99px;padding:.1rem .45rem;margin-bottom:.25rem}
    .stars{font-size:.82rem}
    .empty{text-align:center;color:#aaa;font-size:.9rem;padding:2rem 0}
  </style>
</head>
<body>
<header>
  <span>📚</span>
  <h1>Moja Biblioteka</h1>
  <nav>
    <a href="authors.html">Autorzy</a>
    <a href="index.html">Książki</a>
  </nav>
</header>
<div class="container">
  <div class="author-header" id="author-header">
    <div class="empty">Ładowanie...</div>
  </div>
  <div class="card">
    <h2>Książki autora</h2>
    <div class="books-grid" id="books-grid">
      <div class="empty">Ładowanie...</div>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://ranrnrbrurdobdbxgbsz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbnJucmJydXJkb2JkYnhnYnN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTYyODMsImV4cCI6MjA5Njg3MjI4M30.whc6MPhDdIhx1e98UVdMKVRnURmffZFOz0XGBTzAwmk';
const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

function stars(r) {
  if (!r) return '';
  return '★'.repeat(r).split('').map(()=>`<span style="color:#f59e0b">★</span>`).join('')+
         '★'.repeat(5-r).split('').map(()=>`<span style="color:#ddd">★</span>`).join('');
}

async function load() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href='authors.html'; return; }
  const [aRes, bRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/authors?id=eq.${id}`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/books?author_id=eq.${id}&order=created_at.desc`, { headers }),
  ]);
  const [author] = await aRes.json();
  const books = await bRes.json();
  if (!author) { document.getElementById('author-header').innerHTML='<div class="empty">Autor nie znaleziony.</div>'; return; }
  const initials = author.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.title = `${author.name} — Moja Biblioteka`;
  document.getElementById('author-header').innerHTML = `
    <div class="author-avatar">${initials}</div>
    <div class="author-info">
      <h2>${author.name}</h2>
      ${author.bio ? `<p>${author.bio}</p>` : '<p style="color:#bbb">Brak biogramu.</p>'}
    </div>`;
  const grid = document.getElementById('books-grid');
  if (!books.length) { grid.innerHTML='<div class="empty">Brak książek tego autora.</div>'; return; }
  grid.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-cover">${b.cover_url?`<img src="${b.cover_url}" alt="" onerror="this.parentElement.innerHTML='📖'"/>`:'📖'}</div>
      <div class="book-body">
        ${b.genre?`<div class="genre-badge">${b.genre}</div>`:''}
        <h3>${b.title}</h3>
        <div class="stars">${stars(b.rating)}</div>
      </div>
    </div>`).join('');
}
load();
</script>
</body>
</html>
